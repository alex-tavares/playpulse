name: playpulse-prod

services:
  ingest:
    build:
      context: .
      dockerfile: apps/ingest/Dockerfile
    env_file:
      - .env.production
    environment:
      PLAYPULSE_INGEST_HOST: 0.0.0.0
      PLAYPULSE_INGEST_PORT: 4001
    ports:
      - '4001:4001'
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4001/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  analytics-api:
    build:
      context: .
      dockerfile: apps/analytics-api/Dockerfile
    env_file:
      - .env.production
    environment:
      PLAYPULSE_ANALYTICS_HOST: 0.0.0.0
      PLAYPULSE_ANALYTICS_PORT: 4002
    ports:
      - '4002:4002'
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:4002/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  warehouse-worker:
    build:
      context: .
      dockerfile: apps/warehouse-worker/Dockerfile
    env_file:
      - .env.production
    profiles:
      - jobs
    restart: 'no'

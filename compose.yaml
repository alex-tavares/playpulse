services:
  postgres:
    image: postgres:16-alpine
    container_name: playpulse-postgres
    environment:
      POSTGRES_DB: playpulse
      POSTGRES_PASSWORD: playpulse
      POSTGRES_USER: playpulse
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U playpulse -d playpulse']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '5432:5432'
    volumes:
      - playpulse-postgres-data:/var/lib/postgresql/data

  metabase:
    image: metabase/metabase:latest
    container_name: playpulse-metabase
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      MB_SITE_URL: http://localhost:${PLAYPULSE_METABASE_PORT:-3001}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '${PLAYPULSE_METABASE_PORT:-3001}:3000'
    volumes:
      - playpulse-metabase-data:/metabase-data

volumes:
  playpulse-postgres-data:
  playpulse-metabase-data:
